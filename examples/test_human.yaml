# Test workflow for HumanStep
# This workflow demonstrates human input with schema validation

name: test_human_step

steps:
  # Step 1: Generate some data
  - id: generate_data
    type: shell
    script: |
      echo '{"project": "AgentRails", "version": "0.1.0", "tests_passed": 238}'
    output_format: json

  # Step 2: Human approval step
  - id: approve_release
    type: human
    depends_on: [generate_data]
    message: |
      === RELEASE APPROVAL REQUIRED ===
      
      Project: {{state.generate_data.parsed.project}}
      Version: {{state.generate_data.parsed.version}}
      Tests Passed: {{state.generate_data.parsed.tests_passed}}
      
      Do you approve this release?
      
      Please respond with JSON:
      {"approved": true, "comments": "Your comments here"}
    input_schema:
      type: object
      properties:
        approved:
          type: boolean
          description: "Whether to approve the release"
        comments:
          type: string
          description: "Optional comments"
      required:
        - approved
    timeout: 300

  # Step 3: Act on approval
  - id: finalize
    type: shell
    depends_on: [approve_release]
    script: |
      echo "=== Finalizing Release ==="
      echo "Approved: {{state.approve_release.input.approved}}"
      echo "Comments: {{state.approve_release.input.comments}}"
      echo "Release process complete!"
